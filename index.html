<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة المعلم</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.danger{
background:#dc2626;
color:white;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:20px;
width:95%;
max-width:500px;
}

input,
textarea,
select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
}

.actions{
display:flex;
gap:10px;
}

.tab{
display:none;
}

.active{
display:block;
}

</style>
</head>

<body>

<div class="container">

<h1>لوحة المعلم</h1>

<div class="tabs">

<button class="primary"
onclick="showTab('studentsTab')">

الطلاب

</button>

<button class="primary"
onclick="showTab('sessionsTab')">

الحصص

</button>

</div>

<!-- الطلاب -->

<div id="studentsTab" class="tab active">

<button class="primary"
onclick="openStudentModal()">

إضافة طالب

</button>

<br><br>

<div id="studentsList"></div>

</div>

<!-- الحصص -->

<div id="sessionsTab" class="tab">

<button class="primary"
onclick="openSessionModal()">

إضافة حصة

</button>

<br><br>

<div id="sessionsList"></div>

</div>

</div>

<!-- مودال الطالب -->

<div class="modal" id="studentModal">

<div class="modal-content">

<h2>إضافة طالب</h2>

<input id="studentName" placeholder="اسم الطالب">

<input id="studentGoal" placeholder="الهدف">

<input id="studentLevel" placeholder="المستوى">

<textarea id="studentMethod"
placeholder="طريقة التدريس"></textarea>

<textarea id="studentNotes"
placeholder="ملاحظات"></textarea>

<div class="actions">

<button class="primary"
onclick="saveStudent()">

حفظ

</button>

<button onclick="closeStudentModal()">

إلغاء

</button>

</div>

</div>

</div>

<!-- مودال الحصة -->

<div class="modal" id="sessionModal">

<div class="modal-content">

<h2>إضافة حصة</h2>

<select id="sessionStudent"></select>

<textarea id="lessonContent"
placeholder="ماذا تم في الحصة"></textarea>

<textarea id="homeworkContent"
placeholder="الواجب"></textarea>

<input type="datetime-local" id="sessionDate">

<div class="actions">

<button class="primary"
onclick="saveSession()">

حفظ

</button>

<button onclick="closeSessionModal()">

إلغاء

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,

collection,

addDoc,

getDocs,

deleteDoc,

doc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "ضع apiKey",

authDomain: "ضع authDomain",

projectId: "ضع projectId",

storageBucket: "ضع storageBucket",

messagingSenderId: "ضع messagingSenderId",

appId: "ضع appId"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.showTab = function(tab){

document.querySelectorAll(".tab")
.forEach(el=>el.classList.remove("active"));

document.getElementById(tab)
.classList.add("active");

};

window.openStudentModal = function(){

studentModal.style.display = "flex";

};

window.closeStudentModal = function(){

studentModal.style.display = "none";

};

window.openSessionModal = function(){

sessionModal.style.display = "flex";

};

window.closeSessionModal = function(){

sessionModal.style.display = "none";

};

window.saveStudent = async function(){

const data = {

name: studentName.value,

goal: studentGoal.value,

level: studentLevel.value,

method: studentMethod.value,

notes: studentNotes.value

};

await addDoc(
collection(db,"students"),
data
);

closeStudentModal();

loadStudents();

};

async function loadStudents(){

const snapshot =
await getDocs(collection(db,"students"));

studentsList.innerHTML = "";

sessionStudent.innerHTML = "";

snapshot.forEach(item=>{

const data = item.data();

studentsList.innerHTML += `

<div class="card">

<h3>${data.name}</h3>

<p>الهدف: ${data.goal}</p>

<p>المستوى: ${data.level}</p>

<p>طريقة التدريس: ${data.method}</p>

<p>ملاحظات: ${data.notes}</p>

<button class="danger"
onclick="deleteStudent('${item.id}')">

حذف

</button>

</div>

`;

sessionStudent.innerHTML += `

<option value="${data.name}">
${data.name}
</option>

`;

});

}

window.deleteStudent = async function(id){

await deleteDoc(doc(db,"students",id));

loadStudents();

};

window.saveSession = async function(){

const data = {

student: sessionStudent.value,

lesson: lessonContent.value,

homework: homeworkContent.value,

date: sessionDate.value

};

await addDoc(
collection(db,"sessions"),
data
);

closeSessionModal();

loadSessions();

};

async function loadSessions(){

const snapshot =
await getDocs(collection(db,"sessions"));

sessionsList.innerHTML = "";

snapshot.forEach(item=>{

const data = item.data();

sessionsList.innerHTML += `

<div class="card">

<h3>${data.student}</h3>

<p>الحصة: ${data.lesson}</p>

<p>الواجب: ${data.homework}</p>

<p>${data.date}</p>

<button class="danger"
onclick="deleteSession('${item.id}')">

حذف

</button>

</div>

`;

});

}

window.deleteSession = async function(id){

await deleteDoc(doc(db,"sessions",id));

loadSessions();

};

loadStudents();

loadSessions();

</script>

</body>
</html>
